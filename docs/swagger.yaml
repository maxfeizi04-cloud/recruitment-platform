basePath: /api
definitions:
  application.Application:
    properties:
      created_at:
        type: string
      id:
        type: string
      job_id:
        type: string
      job_title:
        type: string
      resume_id:
        type: string
      status:
        type: string
      updated_at:
        type: string
      user_id:
        type: string
      user_name:
        type: string
    type: object
  application.applyReq:
    properties:
      job_id:
        type: string
      resume_id:
        type: string
    required:
    - job_id
    - resume_id
    type: object
  application.updateStatusReq:
    properties:
      status:
        type: string
    required:
    - status
    type: object
  auth.LoginResult:
    properties:
      token:
        type: string
      user:
        $ref: '#/definitions/auth.User'
    type: object
  auth.User:
    properties:
      avatar_url:
        type: string
      id:
        type: string
      name:
        type: string
      phone:
        type: string
      role:
        type: string
    type: object
  auth.loginReq:
    properties:
      code:
        type: string
      phone:
        type: string
      role:
        enum:
        - candidate
        - hr
        - admin
        type: string
    required:
    - code
    - phone
    - role
    type: object
  auth.sendCodeReq:
    properties:
      phone:
        type: string
    required:
    - phone
    type: object
  interview.Invitation:
    properties:
      attachment_urls:
        items:
          type: string
        type: array
      candidate_name:
        type: string
      candidate_user_id:
        type: string
      company_address:
        type: string
      contact_name:
        type: string
      contact_phone:
        type: string
      created_at:
        type: string
      hr_name:
        type: string
      hr_user_id:
        type: string
      id:
        type: string
      job_application_id:
        type: string
      job_title:
        type: string
      notes:
        type: string
      scheduled_at:
        type: string
      status:
        type: string
      updated_at:
        type: string
    type: object
  interview.interviewReq:
    properties:
      application_id:
        type: string
      company_address:
        type: string
      contact_name:
        type: string
      contact_phone:
        type: string
      notes:
        type: string
      scheduled_at:
        type: string
    required:
    - application_id
    - company_address
    - scheduled_at
    type: object
  interview.updateInvStatusReq:
    properties:
      status:
        type: string
    required:
    - status
    type: object
  job.Job:
    properties:
      created_at:
        type: string
      description:
        type: string
      expire_at:
        type: string
      hr_user_id:
        type: string
      id:
        type: string
      location:
        description: JSON string
        type: string
      requirements:
        description: JSON string
        type: string
      salary_range:
        description: JSON string
        type: string
      status:
        type: string
      title:
        type: string
      updated_at:
        type: string
    type: object
  job.jobReq:
    properties:
      description:
        type: string
      location:
        type: string
      requirements:
        type: string
      salary_range:
        type: string
      title:
        type: string
    required:
    - title
    type: object
  job.statusReq:
    properties:
      status:
        type: string
    required:
    - status
    type: object
  resume.Resume:
    properties:
      attachment_urls:
        items:
          type: string
        type: array
      content:
        type: string
      created_at:
        type: string
      id:
        type: string
      is_default:
        type: boolean
      title:
        type: string
      updated_at:
        type: string
      user_id:
        type: string
    type: object
  resume.resumeReq:
    properties:
      content:
        type: string
      title:
        type: string
    required:
    - title
    type: object
  user.Profile:
    properties:
      avatar_url:
        type: string
      id:
        type: string
      name:
        type: string
      phone:
        type: string
      role:
        type: string
    type: object
  user.certifyReq:
    properties:
      company_name:
        type: string
      position:
        type: string
    required:
    - company_name
    - position
    type: object
  user.updateProfileReq:
    properties:
      avatar_url:
        type: string
      name:
        type: string
    required:
    - name
    type: object
host: localhost:8080
info:
  contact:
    name: API Support
    url: https://github.com/maxfeizi04-cloud/recruitment-platform
  description: 放心招聘平台后端接口文档，支持求职者、招聘者、管理员三端
  title: 放心招聘平台 API
  version: "2.0"
paths:
  /applications:
    post:
      consumes:
      - application/json
      parameters:
      - description: 职位ID和简历ID
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/application.applyReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/application.Application'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: 投递职位
      tags:
      - 投递
  /applications/{id}/status:
    patch:
      consumes:
      - application/json
      parameters:
      - description: 投递ID
        in: path
        name: id
        required: true
        type: string
      - description: 状态值（viewed/accepted/rejected）
